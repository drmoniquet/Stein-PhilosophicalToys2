<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aiButtons — brightness-mapped text</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: #f4f4f4;
      --panel: rgba(20, 20, 20, 0.78);
      --panel-border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font: 13px/1.4 ui-sans-serif, system-ui, sans-serif;
      height: 100%;
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    #text-canvas {
      display: block;
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
    }
    /* The three static sections form a tight footer (~9% of viewport). Heights
       are fixed via CSS vars set by resizeCanvasToWindow so the canvas above
       gets a deterministic remainder. */
    #category-bar {
      flex: 0 0 var(--cat-h, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: #000;
      text-align: center;
      overflow: hidden;
    }
    #category-text {
      font: 600 12px/1 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    #category-text .term {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ffe600;
      font-weight: 700;
    }
    #category-text .cat {
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 10px;
    }
    #commentary-bar {
      flex: 0 0 var(--comment-h, 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: #000;
      text-align: center;
    }
    #commentary-text {
      font: 15px/1.4 ui-sans-serif, system-ui, sans-serif;
      color: #eee;
      max-width: 70ch;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #chiron-canvas {
      display: block;
      width: 100%;
      flex: 0 0 var(--chiron-h, 30px);
      border-top: 1px solid rgba(255,255,255,0.12);
      background: #000;
    }
    #references-footnote {
      flex: 0 0 var(--refs-h, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: #000;
      overflow: hidden;
    }
    #references-text {
      font: italic 10px/1 Georgia, 'Times New Roman', serif;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    /* Light background mode mirrors the canvas/chiron colour flip. */
    body.light #stage,
    body.light #category-bar,
    body.light #commentary-bar,
    body.light #references-footnote { background: #fff; }
    body.light #category-text { color: #111; }
    body.light #category-text .term { color: #b58a00; }
    body.light #commentary-text { color: #1a1a1a; }
    body.light #references-text { color: #111; }
    #controls {
      position: fixed;
      bottom: 12px;
      left: 12px;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      display: grid;
      gap: 8px;
      min-width: 220px;
      font-size: 12px;
      z-index: 10;
    }
    #controls label {
      display: grid;
      grid-template-columns: 70px 1fr 36px;
      align-items: center;
      gap: 8px;
    }
    #controls input[type="range"] { width: 100%; }
    #controls .row { display: flex; gap: 8px; align-items: center; }
    #controls .row label { display: inline-flex; gap: 4px; align-items: center; grid-template-columns: none; }
    #controls button, #controls .filebtn, #controls select {
      padding: 5px 10px;
      background: #222;
      color: var(--fg);
      border: 1px solid var(--panel-border);
      border-radius: 5px;
      font: inherit;
      cursor: pointer;
    }
    #controls button:hover, #controls .filebtn:hover, #controls select:hover { background: #2a2a2a; }
    #controls input[type="file"] { display: none; }
    #controls.collapsed { min-width: 0; padding: 4px; gap: 0; }
    #controls.collapsed > :not(#toggle-controls) { display: none; }
    .stage {
      display: grid;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      background: rgba(255,255,255,0.015);
    }
    .stage > .stage-title {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .stage.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    #source-select { width: 100%; }
    #toggle-controls {
      justify-self: end;
      padding: 2px 8px;
      font-size: 11px;
      line-height: 1.2;
      opacity: 0.75;
    }
    #toggle-controls:hover { opacity: 1; }
    #status {
      font-size: 11px;
      opacity: 0.65;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="text-canvas"></canvas>
    <div id="category-bar"><span id="category-text"></span></div>
    <div id="commentary-bar"><span id="commentary-text"></span></div>
    <canvas id="chiron-canvas"></canvas>
    <div id="references-footnote"><span id="references-text"></span></div>
  </div>

  <div id="controls" class="collapsed">
    <button id="toggle-controls" type="button" title="Show controls (h)">▸</button>

    <div class="stage" id="stage-relationship">
      <div class="stage-title">Presentation</div>
      <div class="row">
        <button id="play-relationship" type="button">Play</button>
        <button id="pause-relationship" type="button">Pause</button>
      </div>
      <div class="row">
        <button id="prev-term" type="button">◀ Prev</button>
        <button id="next-term" type="button">Next ▶</button>
      </div>
      <label title="Seconds each term is shown before advancing">
        <span>Interval s</span>
        <input id="term-interval" type="range" min="2" max="15" step="0.5" value="5" />
        <span id="term-interval-val">5</span>
      </label>
      <div id="relationship-status" style="font-size:11px; opacity:0.65;"></div>
    </div>

    <div id="status">Loading…</div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
